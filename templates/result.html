<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Search Results</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row">

        <div class="col-md-10 mx-auto">

            <h2 class="mb-3">
                🔍 Search Results
            </h2>

            <p class="fs-5">
                Query:
                <strong>{{ query }}</strong>
            </p>

            <a href="/"
               class="btn btn-secondary mb-4">

                ← New Search

            </a>

            {% for item in results %}

            <div class="card shadow-sm mb-3">

                <div class="card-body">

                    <h6 class="text-primary">
                        Rank #{{ item[1] }}
                    </h6>

                    <h5 class="card-title">
                        {{ item[0] }}
                    </h5>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

</body>

</html>
